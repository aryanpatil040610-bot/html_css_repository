<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>

    <h1>Step 1: Personal Details</h1>
    <form>
        <fieldset>
            <legend>Personal Details</legend>

            <label>Full Name:</label>
            <input type="text" placeholder="Enter your full name">
            <br><br>

            <label>Gender:</label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <br><br>

            <label>Date of Birth:</label>
            <input type="date">
            <br><br>

            <label>Nationality:</label>
            <input type="text" placeholder="Enter your nationality">
            <br><br>

            <label>Phone Number:</label>
            <input type="tel" placeholder="Enter your phone number">
            <br><br>

            <label>Email:</label>
            <input type="email" placeholder="Enter your email">
            <br><br>

            <label>Aadhar Number:</label>
            <input type="text" placeholder="Enter your Aadhar number">
        </fieldset>

        <h1>Step 2: Address Details</h1>
        <fieldset>
            <legend>Address Details</legend>

            <label>Address:</label>
            <input type="text" placeholder="Enter your address">
            <br><br>

            <label>City:</label>
            <input type="text" placeholder="Enter your city">
            <br><br>

            <label>State:</label>
            <input type="text" placeholder="Enter your state">
            <br><br>

            <label>Postal Code:</label>
            <input type="text" placeholder="Enter your postal code">
        </fieldset>

        <h1>Step 3: Account Details</h1>
        <fieldset>
            <legend>Account Details</legend>

            <label>Username:</label>
            <input type="text" placeholder="Enter username">
            <br><br>

            <label>Password:</label>
            <input type="password" placeholder="Enter password">
            <br><br>

            <label>Confirm Password:</label>
            <input type="password" placeholder="Confirm password">
        </fieldset>

        <h1>Step 4: Login Details</h1>
        <fieldset>
            <legend>Login Details</legend>

            <label>Username:</label>
            <input type="text" placeholder="Enter username">
            <br><br>

            <label>Password:</label>
            <input type="password" placeholder="Enter password">
        </fieldset>

        <br>
        <input type="checkbox"> I agree to the Terms and Conditions
        <br><br>

        <button type="submit">Login</button>
    </form>

</body>
</html>
