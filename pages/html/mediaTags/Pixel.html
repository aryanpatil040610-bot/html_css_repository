<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurants in Nagpur</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      padding:40px;
    }

    h1{
      margin-bottom:30px;
      color:#222;
    }

    .container{
      display:flex;
      gap:30px;
      flex-wrap:wrap;
    }

    .card{
      width:320px;
      background:white;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .image-box{
      position:relative;
    }

    .image-box img{
      width:100%;
      height:230px;
      object-fit:cover;
    }

    .promoted{
      position:absolute;
      top:10px;
      left:10px;
      background:rgba(0,0,0,0.6);
      color:white;
      font-size:12px;
      padding:5px 10px;
      border-radius:10px;
    }

    .offer{
      position:absolute;
      bottom:10px;
      left:10px;
      background:#2563eb;
      color:white;
      padding:6px 12px;
      border-radius:8px;
      font-size:14px;
      font-weight:bold;
    }

    .content{
      padding:15px;
    }

    .title-rating{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:8px;
    }

    .title-rating h2{
      font-size:24px;
      color:#222;
    }

    .rating{
      background:#15803d;
      color:white;
      padding:4px 8px;
      border-radius:8px;
      font-size:14px;
      font-weight:bold;
    }

    .details{
      color:#666;
      font-size:15px;
      margin-bottom:8px;
    }

    .bottom{
      display:flex;
      justify-content:space-between;
      color:#555;
      font-size:14px;
      margin-top:10px;
    }
  </style>
</head>

<body>

  <h1>Restaurants in Nagpur</h1>

  <div class="container">

    <!-- Card 1 -->
    <div class="card">
      <div class="image-box">
        <img src="https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=1200" alt="">
        <div class="promoted">Promoted</div>
        <div class="offer">Flat 10% OFF</div>
      </div>

      <div class="content">
        <div class="title-rating">
          <h2>Tipsy Turk</h2>
          <div class="rating">4.8 ★</div>
        </div>

        <div class="details">
          Burger, Fast Food, Italian...
        </div>

        <div class="bottom">
          <span>Sadar, Nagpur</span>
          <span>1.4 km</span>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="card">
      <div class="image-box">
        <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1200" alt="">
        <div class="promoted">Promoted</div>
        <div class="offer">Flat 10% OFF</div>
      </div>

      <div class="content">
        <div class="title-rating">
          <h2>Romeo Lane</h2>
          <div class="rating">4.3 ★</div>
        </div>

        <div class="details">
          Bar Food, North Indian...
        </div>

        <div class="bottom">
          <span>Laxmi Nagar, Nagpur</span>
          <span>4.3 km</span>
        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="card">
      <div class="image-box">
        <img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=1200" alt="">
      </div>

      <div class="content">
        <div class="title-rating">
          <h2>Co.So Cocktails</h2>
          <div class="rating">4.7 ★</div>
        </div>

        <div class="details">
          International, Asian...
        </div>

        <div class="bottom">
          <span>Mohan Nagar, Nagpur</span>
          <span>1.3 km</span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
